version: '3.0'

services:
  mysql:
    image: mysql:5.7
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_DATABASE: 'dataelementai'
      MYSQL_ROOT_PASSWORD: '123456'
      MYSQL_CHARSET: 'utf8mb4'
      MYSQL_COLLATION: 'utf8mb4_unicode_ci'
    volumes:
      - mysql-data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: always

  es:
    image: elasticsearch:7.12.1
    environment:
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - discovery.type=single-node
    volumes:
      - es-data:/usr/share/elasticsearch/data
      - ./plugins:/usr/share/elasticsearch/plugins
    privileged: true
    # ports:
    #   - 9200:9200
    #   - 9300:9300

  backend:
    image: yexca/data-element:v1.1
    depends_on:
      - mysql
      - es
    environment:
      - SPRING_PROFILES_ACTIVE=prod
    #   SPRING_DATASOURCE_URL: jdbc:mysql://mysql/mydatabase?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC
    #   SPRING_DATASOURCE_USERNAME: user
    #   SPRING_DATASOURCE_PASSWORD: password
    restart: always

  frontend:
    image: yexca/data-vue:v1.1
    environment:
      - VUE_APP_BASE_URL=/api
      - VUE_APP_URL=http://backend:8952
    ports:
      - "8999:80"
    restart: always

volumes:
  mysql-data:
  es-data:
